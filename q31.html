<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 31</title>
</head>

<body>

    <p id="q31"></p>

    <script>
        let text = "";
        let sum = 0;

        for (let i = 10; i <= 200; i++) {
            sum = 0;
            if (i < 100) {
                let tens = Math.floor(i / 10);
                let ones = i % 10;

                sum = tens + ones;

                if (sum > 10) {
                    text += i + "<br>";
                }
            } else {
                let hundreds = Math.floor(i / 100);
                let tens = Math.floor((i % 100) / 10);
                let ones = i % 10;

                sum = hundreds + tens + ones;

                if (sum > 10) {
                    text += i + "<br>";
                }
            }
        }

        document.getElementById("q31").innerHTML = text;
    </script>

</body>

</html>
