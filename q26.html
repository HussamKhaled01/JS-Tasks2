<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 26</title>
</head>

<body>

    <p id="q26"></p>

    <script>

        let i = 0;
        let text = "";
        let number = 0;
        let reversedNumber = 0;

        for (let i = 1; i <= 300; i++) {

            number = i;
            reversedNumber = 0;

            while (number > 0) {
                let digit = number % 10;
                reversedNumber = reversedNumber * 10 + digit;
                number = Math.floor(number / 10);
            }

            if (reversedNumber % 3 === 0) {
                text += i + "  Reversed: " + reversedNumber + "<br>";
            }

        }

        document.getElementById("q26").innerHTML = text;
    </script>



</body>

</html>
