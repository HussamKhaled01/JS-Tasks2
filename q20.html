<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 20</title>
</head>

<body>

    <p id="q20"></p>

    <script>

        let i = 0;
        let j = 0;
        let text = "";



        for (let i = 1; i < 6; i++) {

            for (let j = 0; j < i; j++) {
                text += "&nbsp;" + i;
            }

            text += "<br>";

        }

        document.getElementById("q20").innerHTML = text;
    </script>



</body>

</html>
