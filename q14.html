<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 14</title>
</head>

<body>

    <p id="q14"></p>

    <script>

        let i = 0;
        let sum = 0;



        for (let i = 1; i < 101; i++) {

            if (i % 2 !== 0) {
                sum += i;
            }

        }

        document.getElementById("q14").innerHTML = sum;
    </script>



</body>

</html>
