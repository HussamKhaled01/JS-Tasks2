<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 13</title>
</head>

<body>

    <p id="q13"></p>

    <script>
        let text = "";

        let i = 0;



        for (let i = 1; i < 101; i++) {

            if (i % 7 === 0) {
                text += i + "&nbsp;&nbsp;";
            }

        }

        document.getElementById("q13").innerHTML = text;
    </script>



</body>

</html>
