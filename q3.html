<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 3</title>
</head>

<body>

    <p id="q3"></p>

    <script>
        let text = "";
        let i = 0;

        for (let i = 0; i < 51; i++) {
            if(i % 2 === 0){
                text += i+ "&nbsp;"
            }
        }

        document.getElementById("q3").innerHTML = text;
    </script>

    

</body>

</html>
