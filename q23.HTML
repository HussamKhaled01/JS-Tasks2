<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 23</title>
</head>

<body>

    <p id="q23"></p>

    <script>

        let i = 0;
        let text = "";
        let number = "";
        let firstDigit = 0;
        let lastDigit = 0;

        for (let i = 1; i <= 100; i++) {
            let number = i;

            firstDigit = Math.floor(number / 10);
            lastDigit = number % 10;

            if (firstDigit === lastDigit) {
                text += i + "<br>";
            }

        }

        document.getElementById("q23").innerHTML = text;
    </script>



</body>

</html>
