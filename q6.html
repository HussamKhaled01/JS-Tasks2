<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 6</title>
</head>

<body>

    <p id="q6"></p>

    <script>

        let text = "";

        for (let i = 1; i <= 5; i++) {

            for (let j = 1; j <= 5; j++) {
                if (i === 1) {
                    text += "1" + " ";
                }
                else if (i === 2) {
                    if (j <= 3) {
                        text += "1" + " ";
                    }
                    else {
                        text += "2" + " ";
                    }
                }
                else if (i === 3) {
                    if (j <= 2) {
                        text += "1" + " ";
                    }
                    else {
                        text += "3" + " ";
                    }
                }
                else if (i === 4) {
                    if (j <= 1) {
                        text += "1" + " ";
                    }
                    else {
                        text += "4" + " ";
                    }
                }
                else {
                    text += "5" + " ";
                }

            }

            text += "<br>";
        }

        document.getElementById("q6").innerHTML = text;
    </script>



</body>

</html>
