<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 24</title>
</head>

<body>

    <p id="q24"></p>

    <script>

        let i = 0;
        let text = "";
        let number = "";        
        let divSum = 1;

        for (let i = 1; i <= 300; i++) {
            let number = i;
            divSum = 1;


            while(number > 0){
                let digit = number % 10;
                divSum = divSum * digit;
                number = Math.floor(number / 10);
            }

            if(i % divSum === 0){
                text += i + "<br>";
            }


            
        }

        document.getElementById("q24").innerHTML = text;
    </script>



</body>

</html>
