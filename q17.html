<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 17</title>
</head>

<body>

    <p id="q17"></p>

    <script>

        let i = 0;
        let j = 0;
        let text = "";



        for (let i = 0; i < 6; i++) {

            for (let j = 0; j < i; j++) {
                text += "* &nbsp;";
            }
            text += "<br>";

        }

        document.getElementById("q17").innerHTML = text;
    </script>



</body>

</html>
