<!DOCTYPE html>
<html>

<head>
    <title>Javascript Task - Question 10</title>
</head>

<body>

    <p id="q10"></p>

    <script>
        let text = "Orange Coding School";

        let countC = 0;



        for (let i = 0; i < text.length; i++) {

            if (text[i] === 'c' || text[i] === 'C') {
                countC++;
            }

        }

        document.getElementById("q10").innerHTML = countC;
    </script>



</body>

</html>
